services: 
  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-azureopscrew}
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: wget -qO - http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
