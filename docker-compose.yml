services:
  api:
    image: ${DOCKER_REGISTRY-}api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_URLS=http://*:80
      - DatabaseProvider=SqlServer
      - SqlServer__ConnectionString=Server=sqlserver;Database=AzureOpsCrew;User Id=sa;Password=YourStrong@Password;TrustServerCertificate=True;
      - LongTermMemory__Type=InMemory
      - LongTermMemory__Neo4j__Uri=bolt://neo4j:7687
      - LongTermMemory__Neo4j__Username=neo4j
      - LongTermMemory__Neo4j__Password=${NEO4J_PASSWORD:-azureopscrew}
      - Jwt__Issuer=${JWT_ISSUER:-AzureOpsCrew}
      - Jwt__Audience=${JWT_AUDIENCE:-AzureOpsCrewFrontend}
      - Jwt__SigningKey=${JWT_SIGNING_KEY:-this_is_a_development_signing_key_change_in_production}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-480}
      - EmailVerification__IsEnabled=${EMAIL_VERIFICATION_ENABLED:-false}
      - EmailVerification__CodeLength=${EMAIL_VERIFICATION_CODE_LENGTH:-6}
      - EmailVerification__CodeTtlMinutes=${EMAIL_VERIFICATION_CODE_TTL_MINUTES:-10}
      - EmailVerification__ResendCooldownSeconds=${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:-30}
      - EmailVerification__MaxVerificationAttempts=${EMAIL_VERIFICATION_MAX_ATTEMPTS:-5}
      - Brevo__ApiBaseUrl=${BREVO_API_BASE_URL:-https://api.brevo.com}
      - Brevo__ApiKey=${BREVO_API_KEY:-}
      - Brevo__SenderEmail=${BREVO_SENDER_EMAIL:-azureopscrew@aoc-app.com}
      - Brevo__SenderName=${BREVO_SENDER_NAME:-Azure Ops Crew}
      - Seeding__IsEnabled=${SEEDING_ENABLED:-true}
      - Seeding__AzureFoundrySeed__ApiEndpoint=${AZURE_OPENAI_API_ENDPOINT:-}
      - Seeding__AzureFoundrySeed__Key=${AZURE_OPENAI_API_KEY:-}
    ports:
      - "42000:80"
    restart: on-failure
    depends_on:
      sqlserver:
        condition: service_healthy

  # Blazor WASM frontend (static files served by nginx).
  # Dockerfile is the Dockerfile.Front (not src/Front/Dockerfile) so VS Docker tooling
  # doesn't match it to Front.csproj and won't override the entrypoint.
  frontend:
    image: ${DOCKER_REGISTRY-}frontend
    build:
      context: .
      dockerfile: Dockerfile.Front
      args:
        API_BASE_URL: http://localhost:42000
    ports:
      - "42080:80"
    restart: on-failure
    depends_on:
      - api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password
    ports:
      - "42433:1433"
    command:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        sleep 30
        /opt/mssql-tools18/bin/sqlcmd -U sa -P YourStrong@Password -C -Q "IF DB_ID('AzureOpsCrew') IS NULL CREATE DATABASE AzureOpsCrew;"
        wait
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-U", "sa", "-P", "YourStrong@Password", "-d", "AzureOpsCrew", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: on-failure

