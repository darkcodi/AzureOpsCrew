services:
  api:
    image: ${DOCKER_REGISTRY-}api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - AzureOpenAI__Endpoint=https://azureopscrewglobfoundry.cognitiveservices.azure.com
      - AzureOpenAI__ApiKey=${AZURE_OPENAI_API_KEY}
      - AzureOpenAI__Model=gpt-5-2-chat
      - DatabaseProvider=Sqlite
      - Sqlite__DataSource=Data Source=azureopscrew.db
      - EnableSeeding=true
    ports:
      - "42100:80"
    restart: on-failure
