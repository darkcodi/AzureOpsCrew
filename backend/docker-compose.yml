services:
  api:
    image: ${DOCKER_REGISTRY-}api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_URLS=http://*:80
      - DatabaseProvider=Sqlite
      - Sqlite__DataSource=Data Source=/app/data/azureopscrew.db

      - LongTermMemory__Type=Cypher
      - LongTermMemory__Neo4j__Uri=bolt://neo4j:7687
      - LongTermMemory__Neo4j__Username=neo4j
      - LongTermMemory__Neo4j__Password=${NEO4J_PASSWORD:-azureopscrew}
      - Jwt__Issuer=${JWT_ISSUER:-AzureOpsCrew}
      - Jwt__Audience=${JWT_AUDIENCE:-AzureOpsCrewFrontend}
      - Jwt__SigningKey=${JWT_SIGNING_KEY:-AzureOpsCrewHackathon2025SecureSigningKey!}

      # OpenAI
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}

      # MCP Servers
      - Mcp__Azure__ServerUrl=${MCP_AZURE_URL:-}
      - Mcp__Azure__TenantId=${MCP_AZURE_TENANT_ID:-}
      - Mcp__Azure__ClientId=${MCP_AZURE_CLIENT_ID:-}
      - Mcp__Azure__ClientSecret=${MCP_AZURE_CLIENT_SECRET:-}
      - Mcp__Azure__TokenUrl=${MCP_AZURE_TOKEN_URL:-}
      - Mcp__Azure__Scope=${MCP_AZURE_SCOPE:-https://management.azure.com/.default}
      - Mcp__AzureDevOps__ServerUrl=${MCP_ADO_URL:-}
      - Mcp__AzureDevOps__TenantId=${MCP_ADO_TENANT_ID:-}
      - Mcp__AzureDevOps__ClientId=${MCP_ADO_CLIENT_ID:-}
      - Mcp__AzureDevOps__ClientSecret=${MCP_ADO_CLIENT_SECRET:-}
      - Mcp__AzureDevOps__TokenUrl=${MCP_ADO_TOKEN_URL:-}
      - Mcp__AzureDevOps__Scope=${MCP_ADO_SCOPE:-499b84ac-1321-427f-aa17-267ca6975798/.default}

      # Seeding
      - Seeding__IsEnabled=${SEEDING_ENABLED:-true}
    volumes:
      - ./data:/app/data
    ports:
      - "42100:80"
    restart: on-failure
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_API_URL=http://api:80
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: on-failure

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-azureopscrew}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: wget -qO - http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
