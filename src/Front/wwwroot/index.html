<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AzureOpsCrew</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/gg-sans@5.1.0/index.min.css" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/discord.css" />
    <link rel="stylesheet" href="css/markdown.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Front.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        #blazor-error-ui {
            display: none;
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background: #3b3b3b;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            font-size: 0.9rem;
        }

        #blazor-error-ui .dismiss {
            cursor: pointer;
            float: right;
        }

        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background-color: #202225;
            font-family: "gg sans", "Noto Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #dcddde;
            user-select: none;
        }

        .splash-logo {
            width: 80px;
            height: 80px;
            border-radius: 1.25rem;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .splash-logo svg {
            width: 44px;
            height: 44px;
            color: #fff;
        }

        .splash-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 32px;
            letter-spacing: -0.2px;
        }

        .splash-bar-track {
            width: 260px;
            height: 6px;
            background: #2f3136;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 36px;
        }

        .splash-bar-fill {
            height: 100%;
            width: 40%;
            border-radius: 3px;
            background: #5865F2;
            animation: splashSlide 1.6s ease-in-out infinite;
        }

        @keyframes splashSlide {
            0%   { transform: translateX(-100%); width: 40%; }
            50%  { transform: translateX(160%);  width: 60%; }
            100% { transform: translateX(-100%); width: 40%; }
        }

        .splash-tip-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #5865F2;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .splash-tip {
            font-size: 14px;
            color: #72767d;
            max-width: 340px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="splash">
            <div class="splash-logo">
                <svg width="800px" height="800px" viewBox="0 -28.5 256 256" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                        <path d="M118.431947,187.698037 C151.322003,181.887937 178.48731,177.08008 178.799309,177.013916 L179.366585,176.893612 L148.31513,139.958881 C131.236843,119.644776 117.26369,102.945381 117.26369,102.849118 C117.26369,102.666861 149.32694,14.3716012 149.507189,14.057257 C149.567455,13.952452 171.38747,51.62411 202.400338,105.376064 C231.435152,155.699606 255.372949,197.191547 255.595444,197.580359 L255.999996,198.287301 L157.315912,198.274572 L58.6318456,198.261895 L118.431947,187.698073 L118.431947,187.698037 Z M-4.03864498e-06,176.434723 C-4.03864498e-06,176.382721 14.631291,150.983941 32.5139844,119.992969 L65.0279676,63.6457518 L102.919257,31.8473052 C123.759465,14.3581634 140.866667,0.0274832751 140.935253,0.00062917799 C141.003839,-0.0247829554 140.729691,0.665213042 140.326034,1.53468179 C139.922377,2.40415053 121.407304,42.1170321 99.1814268,89.7855264 L58.7707514,176.455514 L29.3853737,176.492355 C13.2234196,176.512639 -4.03864498e-06,176.486664 -4.03864498e-06,176.434703 L-4.03864498e-06,176.434723 Z" fill="#0089D6" fill-rule="nonzero">
                        </path>
                    </g>
                </svg>
            </div>
            <div class="splash-title">AzureOpsCrew</div>
            <div class="splash-bar-track">
                <div class="splash-bar-fill"></div>
            </div>
            <div class="splash-tip-label">Did you know</div>
            <div class="splash-tip" id="splash-tip"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        (function () {
            var tips = [
                "You can mention agents with @ to get their attention in any channel.",
                "AzureOpsCrew agents can collaborate across channels to solve complex tasks.",
                "Direct messages are great for focused one-on-one conversations with agents.",
                "Each channel can have multiple agents working together as a crew.",
                "You can add or remove agents from channels at any time.",
                "Agents will show a typing indicator while they're thinking about a response.",
                "Press Enter to send a message, or click the send button."
            ];
            var el = document.getElementById("splash-tip");
            if (el) el.textContent = tips[Math.floor(Math.random() * tips.length)];
        })();
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        window.scrollToBottom = (element) => {
            if (element) {
                element.scrollTop = element.scrollHeight;
            }
        };
    </script>
</body>

</html>
